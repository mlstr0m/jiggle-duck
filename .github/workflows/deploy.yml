# Build + deploiement GitHub Pages a chaque push sur main.
# Pages sert en HTTPS -> la webcam fonctionne, et le build Vite en base
# relative ('./') est relogeable sous /jiggle-duck/ sans configuration.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Les videos de presentation (assets de la release "media") sont
      # embarquees dans le site Pages : servies en video/mp4 SANS redirection
      # — necessaires pour les embeds (Muzli refuse le 302 des releases) —
      # et sans jamais alourdir le repo git.
      - name: media
        run: |
          mkdir -p dist/media
          curl -sL -o dist/media/169_jiggleducks.mp4 \
            "https://github.com/${{ github.repository }}/releases/download/media/169_jiggleducks.mp4"
          curl -sL -o dist/media/916_jiggleducks.mp4 \
            "https://github.com/${{ github.repository }}/releases/download/media/916_jiggleducks.mp4"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
