# Config nginx pour Jiggle Duck (dossier dist/ statique).
# Points importants : MIME wasm, gzip, cache long sur les assets fingerprintes.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # MIME corrects (le .task de MediaPipe est un binaire opaque)
  types {
    application/wasm wasm;
    application/octet-stream task;
    model/gltf-binary glb;
  }
  include /etc/nginx/mime.types;

  gzip on;
  gzip_types text/css application/javascript application/wasm model/gltf-binary;

  # assets fingerprintes par Vite : cache agressif
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
  # gros binaires stables (wasm, modele, glb) : cache long aussi
  location ~ \.(wasm|task|glb|ktx2)$ {
    add_header Cache-Control "public, max-age=604800";
  }
  # l'entree HTML : jamais cachee (les deploiements se voient tout de suite)
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
