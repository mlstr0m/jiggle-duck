<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Short experience with MediaPipe. Everything runs locally in your browser." />
    <meta property="og:title" content="Ducks — An interactive migration" />
    <meta property="og:description" content="Pinch a plush duck through your webcam and join the migration. Everything runs locally in your browser." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#14161a" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦆</text></svg>" />
    <title>Ducks — An interactive migration</title>
    <style>
      :root {
        color-scheme: dark;
        --ui: #e8e8e8;
        --dim: #8a8a8a;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #14161a;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--ui);
        overflow: hidden;
      }
      #app { position: fixed; inset: 0; }
      canvas.three { display: block; width: 100%; height: 100%; }

      /* Retour webcam + squelette de main, en PIP */
      #pip {
        position: fixed;
        bottom: 16px;
        left: 16px;
        width: 260px;
        aspect-ratio: 4 / 3;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        border: 1px solid #2a2e35;
        transition: opacity 0.25s;
      }
      #pip.idle { opacity: 0.45; }
      #pip video,
      #pip canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Miroir : l'utilisateur doit se voir comme dans une glace. */
        transform: scaleX(-1);
      }

      #status {
        position: fixed;
        top: 16px;
        left: 16px;
        padding: 8px 12px;
        background: rgba(20, 22, 26, 0.85);
        border: 1px solid #2a2e35;
        border-radius: 6px;
        max-width: 380px;
        white-space: pre-line;
      }
      #status b { color: #ffcc4d; font-weight: 600; }
      #status .err { color: #ff6b6b; }

      #start {
        position: fixed;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 16px;
        justify-items: center;
        background: #14161a;
        z-index: 10;
        text-align: center;
      }
      #start button {
        font: inherit;
        font-size: 14px;
        padding: 12px 28px;
        border-radius: 999px;
        border: 1px solid #3a4049;
        background: #1e222a;
        color: var(--ui);
        cursor: pointer;
      }
      #start button:hover { background: #262b34; border-color: #4a525d; }
      #start p { color: var(--dim); max-width: 420px; }

      #hud {
        position: fixed;
        bottom: 16px;
        right: 16px;
        padding: 6px 10px;
        background: rgba(20, 22, 26, 0.85);
        border: 1px solid #2a2e35;
        border-radius: 6px;
        font-size: 11px;
        color: var(--dim);
        white-space: pre;
        pointer-events: none;
      }
      #hud .bad { color: #ff6b6b; }

      /* curseur main : suit le pincement, remplace le curseur systeme */
      #handcur {
        position: fixed;
        left: 0;
        top: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
        z-index: 20;
        will-change: transform;
      }
      /* curseur ultra discret : un anneau qui se referme quand on pince —
         lisible sans explication, invisible quand on n'y pense pas */
      #handcur-ring {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, border-color 0.15s;
        filter: drop-shadow(0 1px 5px rgba(8, 24, 70, 0.5));
        will-change: transform;
      }
      #handcur-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
      }
      #handcur.pinch #handcur-ring {
        background: rgba(255, 255, 255, 0.25);
        border-color: #fff;
      }
      #handcur-label {
        font-size: 10px;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.8);
        text-shadow: 0 1px 4px rgba(8, 24, 70, 0.6);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="pip" class="idle">
      <video id="webcam" playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div id="status">loading…</div>

    <div id="hud"></div>

    <div id="handcur">
      <div id="handcur-ring"><div id="handcur-dot"></div></div>
      <span id="handcur-label">pinch to control</span>
    </div>

    <div id="start">
      <button id="start-btn">Enable camera</button>
      <p id="start-note" style="font-size: 11px"></p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
